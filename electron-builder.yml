appId: com.hyjoong.worktree-manager
productName: Worktree Manager
artifactName: Worktree-Manager-${version}-${os}-${arch}.${ext}
asar: true
npmRebuild: false
extraMetadata:
  main: dist/main/index.js
  dependencies: {}
directories:
  output: release/${version}
files:
  - package.json
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
dmg:
  sign: true
publish:
  provider: github
  owner: hyjoong
  repo: worktree-manager
